name: Build and Zip Artifacts on Tag Push

on:
    push:
        tags:
            - "*"

permissions:
    contents: read
    actions: write

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint:check

            - name: Format
              run: npm run format:check

            - name: Test
              run: npm run test:ci

    build-and-archive:
        needs: validate
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                include:
                    # Production: minified store build (Chrome Web Store deliverable).
                    - flavor: prod
                      script: build:prod
                      suffix: ""
                    # Development: unminified bundle with source maps and dev-only
                    # tooling (e.g. selector health check). For sideloading / debugging.
                    - flavor: dev
                      script: build:dev
                      suffix: "-dev"

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Build ${{ matrix.flavor }} Flavor
              run: npm run ${{ matrix.script }}

            - name: Zip dist folder
              run: zip -r dist-${{ github.ref_name }}${{ matrix.suffix }}.zip dist

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ github.ref_name }}${{ matrix.suffix }}
                  path: dist-${{ github.ref_name }}${{ matrix.suffix }}.zip
