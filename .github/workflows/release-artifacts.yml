name: Build and Zip Artifacts on Tag Push

on:
    push:
        tags:
            - "*"

jobs:
    build-and-archive:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint:check

            - name: Format
              run: npm run format:check

            - name: Test
              run: npm run test:ci

            - name: Build Production Flavor
              run: npm run build:prod

            - name: Zip Production dist folder
              run: zip -r dist-${{ github.ref_name }}.zip dist

            - name: Upload Production Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ github.ref_name }}
                  path: dist-${{ github.ref_name }}.zip

            # Dev flavor: unminified bundle with source maps and dev-only tooling
            # (e.g. selector health check) for sideloading / debugging. Not for
            # Chrome Web Store submission.
            - name: Build Development Flavor
              run: npm run build:dev

            - name: Zip Development dist folder
              run: zip -r dist-${{ github.ref_name }}-dev.zip dist

            - name: Upload Development Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ github.ref_name }}-dev
                  path: dist-${{ github.ref_name }}-dev.zip
