name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint:check

            - name: Format
              run: npm run format:check

            - name: Test
              run: npm run test:ci

    # Smoke-check both build flavors so webpack breakage is caught in CI,
    # not just at release time.
    build:
        needs: validate
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                include:
                    - flavor: prod
                      script: build:prod
                    - flavor: dev
                      script: build:dev

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Build ${{ matrix.flavor }} Flavor
              run: npm run ${{ matrix.script }}
